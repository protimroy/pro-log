<!doctype html>
<html>
  <head>
    <title>{{title}}</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {{& seo.head}}
    {{& theme.head}}
    {{& page_assets.head}}
    {{& component.head}}
    <style>
      .article-shell {
        max-width: 60rem;
        margin: 0 auto;
        padding: 2.5rem 1.5rem 4rem;
      }
      .article-topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
        margin-bottom: 2rem;
        padding-bottom: 0.75rem;
        border-bottom: 1px solid #dbdbdb;
        font-size: 0.95rem;
      }
      .article-topbar a {
        color: inherit;
      }
      .article-header {
        margin-bottom: 2rem;
      }
      .article-kicker {
        margin-bottom: 0.75rem;
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #5c5c5c;
      }
      .article-title {
        margin-bottom: 1rem;
        line-height: 1.05;
      }
      .article-dek {
        max-width: 44rem;
        margin: 0;
        color: #4a4a4a;
        font-size: 1.15rem;
      }
      .article-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem 1.5rem;
        margin-top: 1rem;
        font-size: 0.9rem;
        color: #5c5c5c;
      }
      .article-grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        gap: 2rem;
      }
      .article-toc {
        padding: 1rem 1.1rem;
        border: 1px solid #dbdbdb;
        background: #fafaf8;
      }
      .article-toc:empty {
        display: none;
      }
      .article-toc ul {
        margin: 0;
      }
      .article-toc li + li {
        margin-top: 0.45rem;
      }
      .article-content {
        max-width: 46rem;
      }
      .article-content .content {
        font-size: 1rem;
        line-height: 1.7;
      }
      .article-content .content > h6 {
        margin-top: 2.4rem;
        margin-bottom: 0.8rem;
        font-size: 0.85rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .article-content .content > p:first-child {
        font-size: 1.08rem;
      }
      .article-content pre {
        padding: 1rem 1.15rem;
        overflow-x: auto;
        border: 1px solid #dbdbdb;
        background: #f7f7f4;
      }
      .admonition { margin: 1.5rem 0; padding: 1rem; border-left: 0.35rem solid #4a4a4a; background: #f7f7f4; }
      .admonition-title { margin-bottom: 0.5rem; font-weight: 700; text-transform: uppercase; font-size: 0.8rem; }
      .details-block { margin: 1.5rem 0; padding: 0; border: 1px solid #dbdbdb; border-radius: 0; overflow: hidden; }
      .details-block > summary { display: block; list-style: none; position: relative; margin: 0; padding: 0.85rem 2.75rem 0.85rem 1rem; cursor: pointer; font-weight: 700; background: #fafaf8; user-select: none; }
      .details-block > summary::-webkit-details-marker { display: none; }
      .details-block > summary::after { content: "+"; position: absolute; top: 50%; right: 1rem; transform: translateY(-50%); font-size: 1rem; font-weight: 400; }
      .details-block[open] > summary { border-bottom: 1px solid #dbdbdb; }
      .details-block[open] > summary::after { content: "-"; }
      .details-block > :not(summary) { margin: 0; padding: 0.85rem 1rem 1rem; }
      .article-figure, .margin-figure, .interactive-figure { margin: 2rem 0; }
      .article-figure img, .margin-figure img { display: block; width: 100%; border: 0; background: transparent; }
      .interactive-figure img, .interactive-figure svg { display: block; width: 100%; border: 0; background: transparent; }
      .article-figure figcaption, .margin-figure figcaption, .interactive-figure figcaption { margin-top: 0.75rem; color: #5c5c5c; font-size: 0.95rem; }
      .interactive-figure-frame { padding: 1rem; border: 1px solid #dbdbdb; background: #ffffff; }
      .citation-group, .footnote-ref { font-size: 0.9em; }
      .sidenote { display: inline-block; margin: 0.15rem 0.35rem; padding-left: 0.75rem; border-left: 2px solid #dbdbdb; color: #5c5c5c; font-size: 0.9rem; }
      .sidenote-number { margin-right: 0.35rem; font-weight: 700; }
      @media screen and (min-width: 1024px) {
        .article-grid {
          grid-template-columns: minmax(0, 12rem) minmax(0, 1fr);
          align-items: start;
        }
      }
      @media screen and (min-width: 1216px) {
        .sidenote { float: right; clear: right; width: 14rem; margin-right: -16rem; margin-left: 1rem; margin-top: 0.25rem; }
        .margin-figure { float: right; clear: right; width: 16rem; margin-right: -18rem; margin-left: 1.5rem; margin-top: 0.35rem; }
      }
    </style>
  </head>
  <body>
    <div class="article-shell">
      <div class="article-topbar">
        <a href="https://www.protimroy.com/">Back home</a>
        <span>Pro-Log</span>
      </div>
      <header class="article-header">
        <p class="article-kicker">Research Note</p>
        <h1 class="title article-title">{{title}}</h1>
        <p class="article-dek">{{description}}</p>
        <div class="article-meta">
          <span>{{reading_time}}</span>
        </div>
      </header>
      <div class="article-grid">
        <aside class="article-toc">
          {{& toc}}
        </aside>
        <main class="article-content">
          <div class="content">
            {{& content}}
          </div>
          {{& page.nav}}
        </main>
      </div>
    </div>
    {{& theme.body}}
    {{& page_assets.body}}
    {{& component.body}}
  </body>
</html>
